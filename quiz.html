<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>វិញ្ញាសា | ExamReady</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* FEATURED CARD */
  .featured-card {
    background: linear-gradient(135deg, var(--brown) 0%, #4f51d6 100%);
    border-radius: var(--radius);
    padding: 1.5rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
    margin-bottom: 2rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .featured-card:hover { opacity: 0.92; }
  .featured-icon {
    width: 64px; height: 64px;
    background: rgba(255,255,255,0.15);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
  }
  .featured-content { flex: 1; }
  .featured-tag {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .featured-title {
    font-size: 1.2rem;
    font-weight: 700;
    color: white;
    margin-bottom: 5px;
  }
  .featured-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    line-height: 1.6;
  }
  .featured-btn {
    background: white;
    color: var(--brown);
    padding: 10px 22px;
    border-radius: 10px;
    font-family: 'Kantumruy Pro', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }
  .featured-btn:hover { opacity: 0.9; }

  :root {
    --brown: #9a623a;
    --brown-dark: #7a4a2a;
    --brown-light: #f5ede5;
    --brown-mid: #c8906a;
    --cream: #faf7f3;
    --white: #ffffff;
    --text-dark: #1a1208;
    --text-mid: #5c4030;
    --text-muted: #9a7860;
    --border: rgba(154,98,58,0.18);
    --radius: 16px;
    --radius-sm: 10px;
    --green: #1a7a40;
    --green-bg: #e8f8ee;
    --red: #b81a1a;
    --red-bg: #ffeaea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Kantumruy Pro', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
  }

  nav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; height: 60px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { width: 36px; height: 36px; background: var(--brown); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: white; font-size: 17px; }
  .logo-text { font-size: 19px; font-weight: 700; color: var(--brown); }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    text-decoration: none; color: var(--text-mid); font-size: 14px; font-weight: 500;
    padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--white); transition: all 0.15s;
  }
  .back-btn:hover { background: var(--brown-light); border-color: var(--brown-mid); color: var(--brown); }

  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* SUBJECT PICKER */
  #subjectPicker { }
  .picker-title { font-size: 1.4rem; font-weight: 700; color: var(--text-dark); margin-bottom: 0.4rem; }
  .picker-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.8rem; }
  .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .subject-card {
    background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 1.2rem; cursor: pointer; transition: all 0.18s; text-align: left;
  }
  .subject-card:hover { border-color: var(--brown-mid); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(154,98,58,0.10); }
  .subject-card .s-icon { font-size: 2rem; margin-bottom: 0.6rem; }
  .subject-card .s-name { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 3px; }
  .subject-card .s-meta { font-size: 12px; color: var(--text-muted); }

  /* QUIZ SCREEN */
  #quizScreen { display: none; }

  .quiz-header { margin-bottom: 1.5rem; }
  .quiz-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
  .quiz-subject { font-size: 14px; font-weight: 600; color: var(--brown); background: var(--brown-light); padding: 5px 14px; border-radius: 20px; }
  .timer-box {
    display: flex; align-items: center; gap: 7px;
    font-size: 15px; font-weight: 700; color: var(--text-dark);
    background: var(--white); border: 1.5px solid var(--border); border-radius: 10px; padding: 6px 14px;
  }
  .timer-box.warning { border-color: #e57c00; color: #b85a00; background: #fff8e8; }
  .timer-box.danger { border-color: #cc2222; color: #aa1111; background: var(--red-bg); }

  .progress-bar-wrap { background: #ede8e0; border-radius: 99px; height: 7px; overflow: hidden; margin-bottom: 0.5rem; }
  .progress-bar-fill { height: 100%; background: var(--brown); border-radius: 99px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--text-muted); }

  .question-card {
    background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 1.8rem; margin-bottom: 1.2rem;
  }
  .q-number { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.8rem; }
  .q-text { font-size: 17px; font-weight: 600; color: var(--text-dark); line-height: 1.6; }

  .options-list { display: flex; flex-direction: column; gap: 0.7rem; margin-top: 1.5rem; }
  .option-btn {
    display: flex; align-items: center; gap: 14px;
    background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px 18px; cursor: pointer; text-align: left; font-family: 'Kantumruy Pro', sans-serif;
    font-size: 15px; color: var(--text-dark); transition: all 0.15s; width: 100%;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--brown-mid); background: var(--brown-light); }
  .option-btn .opt-letter {
    width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    background: #ede8e0; color: var(--text-mid); transition: all 0.15s;
  }
  .option-btn.correct { background: var(--green-bg); border-color: #1a7a40; color: var(--green); }
  .option-btn.correct .opt-letter { background: var(--green); color: white; }
  .option-btn.wrong { background: var(--red-bg); border-color: #cc2222; color: var(--red); }
  .option-btn.wrong .opt-letter { background: var(--red); color: white; }
  .option-btn.reveal { background: var(--green-bg); border-color: #1a7a40; color: var(--green); }
  .option-btn.reveal .opt-letter { background: var(--green); color: white; }
  .option-btn:disabled { cursor: default; }

  .feedback-box {
    padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
    margin-top: 0.8rem; display: none;
  }
  .feedback-box.correct { background: var(--green-bg); color: var(--green); }
  .feedback-box.wrong { background: var(--red-bg); color: var(--red); }

  .nav-buttons { display: flex; justify-content: flex-end; gap: 0.8rem; margin-top: 1rem; }
  .btn {
    padding: 11px 24px; border-radius: 10px; font-family: 'Kantumruy Pro', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary { background: var(--brown); color: white; }
  .btn-primary:hover { background: var(--brown-dark); }
  .btn-primary:disabled { background: #c8b0a0; cursor: not-allowed; }
  .btn-outline { background: var(--white); color: var(--text-mid); border: 1.5px solid var(--border); }
  .btn-outline:hover { border-color: var(--brown-mid); color: var(--brown); }

  /* RESULTS SCREEN */
  #resultsScreen { display: none; }
  .results-card {
    background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 2.5rem; text-align: center; margin-bottom: 1.5rem;
  }
  .score-ring {
    width: 120px; height: 120px; border-radius: 50%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 1.2rem; font-size: 2.2rem; font-weight: 700; color: white;
  }
  .score-ring .score-pct { font-size: 13px; font-weight: 500; opacity: 0.85; }
  .results-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.4rem; }
  .results-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 2rem; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
  .stat-box { background: var(--cream); border-radius: var(--radius-sm); padding: 1rem; }
  .stat-box .sb-num { font-size: 1.5rem; font-weight: 700; }
  .stat-box .sb-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stat-box.green .sb-num { color: var(--green); }
  .stat-box.red .sb-num { color: var(--red); }
  .stat-box.brown .sb-num { color: var(--brown); }

  .review-list { text-align: left; margin-top: 1.5rem; }
  .review-item { padding: 1rem 1.2rem; border-radius: var(--radius-sm); margin-bottom: 0.6rem; border: 1px solid; }
  .review-item.correct { background: var(--green-bg); border-color: #a8dbc0; }
  .review-item.wrong { background: var(--red-bg); border-color: #f4b8b8; }
  .review-item .ri-q { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
  .review-item .ri-a { font-size: 13px; }
  .review-item.correct .ri-a { color: var(--green); }
  .review-item.wrong .ri-a { color: var(--red); }
  .review-item .ri-correct { font-size: 12px; color: var(--green); margin-top: 3px; font-weight: 500; }

  .results-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

  @media (max-width: 600px) {
    .subjects-grid { grid-template-columns: 1fr 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr 1fr; }
    .q-text { font-size: 15px; }
    .option-btn { font-size: 14px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="logo" href="exam-category.html">
      <div class="logo-icon">📚</div>
      <span class="logo-text">ExamReady</span>
    </a>
    <a class="back-btn" href="exam-category (1).html">← ត្រឡប់ទៅវិញ</a>
  </div>
</nav>

<div class="container">

    <div class="featured-card" onclick="window.location='#'">
      <div class="featured-icon">
        <img src="MoEYS-Cambodia.svg.png" alt="My Website Logo" width="30" height="auto">
      </div>
      <div class="featured-content">

        <div class="featured-title">វិញ្ញាសាទូទៅ — គ្រូបង្រៀន</div>
        <div class="featured-desc">ការប្រឡងចូលបម្រើការ ជំហររបស់គ្រូបង្រៀន — គ្រប់ស្ថានភាព ទូទៅ និងចំណេះដឹងទូទៅ</div>
      </div>
    </div>

  <!-- SUBJECT PICKER -->
  <div id="subjectPicker">
    <p class="picker-title">ជ្រើសរើសមុខវិជ្ជា</p>
    <p class="picker-sub">ចុចលើមុខវិជ្ជា ដើម្បីចាប់ផ្ដើមវិញ្ញាសា</p>
    <div class="subjects-grid" id="subjectsGrid"></div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizScreen">
    <div class="quiz-header">
      <div class="quiz-top">
        <span class="quiz-subject" id="quizSubjectLabel"></span>
        <div class="timer-box" id="timerBox">⏱ <span id="timerDisplay">00:00</span></div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel"></div>
    </div>

    <div class="question-card">
      <div class="q-number" id="qNumber"></div>
      <div class="q-text" id="qText"></div>
      <div class="options-list" id="optionsList"></div>
      <div class="feedback-box" id="feedbackBox"></div>
    </div>

    <div class="nav-buttons">
      <button class="btn btn-outline" id="skipBtn" onclick="skipQuestion()">រំលង →</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>បន្ទាប់ →</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="resultsScreen">
    <div class="results-card">
      <div class="score-ring" id="scoreRing">
        <span id="scoreNum"></span>
        <span class="score-pct" id="scorePct"></span>
      </div>
      <div class="results-title" id="resultsTitle"></div>
      <div class="results-sub" id="resultsSub"></div>
      <div class="stats-row">
        <div class="stat-box green"><div class="sb-num" id="correctCount"></div><div class="sb-label">ត្រឹមត្រូវ</div></div>
        <div class="stat-box red"><div class="sb-num" id="wrongCount"></div><div class="sb-label">មិនត្រឹមត្រូវ</div></div>
        <div class="stat-box brown"><div class="sb-num" id="timeUsed"></div><div class="sb-label">ពេលវេលា</div></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-outline" onclick="showPicker()">← ជ្រើសមុខវិជ្ជាផ្សេង</button>
        <button class="btn btn-primary" onclick="retryQuiz()">🔄 ធ្វើម្ដងទៀត</button>
      </div>
    </div>

    <div class="review-list" id="reviewList"></div>
  </div>

</div>

<script>
const SUBJECTS = [
  {
    id: 'general', name: 'ចំណេះដឹងទូទៅ', icon: '🌏', time: 45,
    questions: [
      {
    q: '២០. តើពិធីបុណ្យ "Galungan" ជាពិធីបុណ្យប្រពៃណីសាសនាហិណ្ឌូដ៏ល្បីល្បាញ នៅលើកោះណានៃតំបន់អាស៊ាន?',
    opts: ['កោះជ្វា', 'កោះស៊ូម៉ាត្រា', 'កោះបាលី (ឥណ្ឌូនេស៊ី)', 'កោះភូកេត'],
    ans: 2
  },
  {
    q: '២១. តើសិល្បៈល្ខោនស្រមោលស្បែក "Wayang Kulit" ត្រូវបានចុះបញ្ជីជាបេតិកភណ្ឌអរូបីរបស់ប្រទេសណា?',
    opts: ['ម៉ាឡេស៊ី', 'ឥណ្ឌូនេស៊ី', 'ហ្វីលីពីន', 'ព្រុយណេ'],
    ans: 1
  },
  {
    q: '២២. តើទីក្រុងប្រវត្តិសាស្ត្រ "អយុធ្យា" (Ayutthaya) ស្ថិតនៅប្រទេសណា?',
    opts: ['ថៃ', 'ឡាវ', 'មីយ៉ាន់ម៉ា', 'កម្ពុជា'],
    ans: 0
  },
  {
    q: '២៣. តើទីក្រុងប្រវត្តិសាស្ត្រ "ម៉ាឡាកា" (Malacca / Melaka) ស្ថិតនៅប្រទេសណា?',
    opts: ['ឥណ្ឌូនេស៊ី', 'ម៉ាឡេស៊ី', 'ហ្វីលីពីន', 'សិង្ហបុរី'], 
    ans: 1
  },
      { q: 'តើរាជធានីភ្នំពេញស្ថិតនៅខេត្តណា?', opts: ['កណ្ដាល','ភ្នំពេញ','តាកែវ','កំពត'], ans: 1 },
      { q: 'តើថ្ងៃជាតិកម្ពុជាត្រូវបានប្រារព្ធនៅថ្ងៃទី?', opts: ['៩ វិចិ្ឆកា','៧ មករា','១ ធ្នូ','១៧ មេសា'], ans: 0 },
      { q: 'តើទំនប់វារីអគ្គិសនីធំបំផុតនៅកម្ពុជាគឺ?', opts: ['ខ្ទីហ','ស្ទឹងត្រែង','ដំបែ','ស្ទឹងហ្សាំ'], ans: 1 },
      { q: 'តើប្រជាជនកម្ពុជាសរុបប្រហែល?', opts: ['១២ លាននាក់','១៦ លាននាក់','២០ លាននាក់','២៥ លាននាក់'], ans: 1 },
      { q: 'ស្ថាបត្យករបស់អង្គរវត្តសាងឡើងក្នុងរជ្ជកាលព្រះបាទ?', opts: ['ជ័យវរ្ម័នទី ២','សូរ្យវរ្ម័នទី ២','ជ័យវរ្ម័នទី ៧','ធរណីន្ទ្រវរ្ម័ន'], ans: 1 },
      { q: 'តើទឹកដីកម្ពុជាមានប្រហែលប៉ុន្មាន km²?', opts: ['១២ ម៉ឺន','១៨ ម៉ឺន','២២ ម៉ឺន','២៨ ម៉ឺន'], ans: 1 },
      { q: 'ភ្នំបើកចំហខ្ពស់ជាងគេនៅកម្ពុជា?', opts: ['ភ្នំក្រវាញ','ភ្នំអាវ','ភ្នំអូរ៉ាល','ភ្នំសំពៅ'], ans: 2 },
      { q: 'តើកម្ពុជាក្លាយជារដ្ឋឯករាជ្យពេញលេញនៅ?', opts: ['១៩៤៥','១៩៥៣','១៩៥៥','១៩៦០'], ans: 1 },
      { q: 'តើអក្សរកាត់ ASCC នៅក្នុងសសរស្តម្ភទាំង៣ របស់សហគមន៍អាស៊ាន តំណាងឱ្យសហគមន៍មួយណា?', opts: ['ASEAN Science and Climate Center','ASEAN Small Commerce Council','ASEAN Socio-Cultural Community (សហគមន៍សង្គម-វប្បធម៌អាស៊ាន)','ASEAN Security and Crisis Community'], ans: 2 },
    ]
  },
  {

let currentSubject = null;
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = [];
let timerInterval = null;
let secondsLeft = 0;
let secondsUsed = 0;
let answered_flag = false;

function renderSubjectPicker() {
  const grid = document.getElementById('subjectsGrid');
  grid.innerHTML = '';
  SUBJECTS.forEach(s => {
    const card = document.createElement('div');
    card.className = 'subject-card';
    card.innerHTML = `<div class="s-icon">${s.icon}</div><div class="s-name">${s.name}</div><div class="s-meta">📝 ${s.questions.length} សំណួរ &nbsp;⏱ ${s.time} នាទី</div>`;
    card.onclick = () => startQuiz(s);
    grid.appendChild(card);
  });
}

function startQuiz(subject) {
  currentSubject = subject;
  currentQuestions = shuffle([...subject.questions]);
  currentIndex = 0;
  score = 0;
  answered = [];
  secondsLeft = subject.time * 60;
  secondsUsed = 0;

  document.getElementById('subjectPicker').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('quizSubjectLabel').textContent = subject.icon + ' ' + subject.name;

  startTimer();
  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startTimer() {
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    secondsLeft--;
    secondsUsed++;
    updateTimerDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      showResults();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  document.getElementById('timerDisplay').textContent = pad(m) + ':' + pad(s);
  const box = document.getElementById('timerBox');
  box.className = 'timer-box';
  if (secondsLeft <= 30) box.classList.add('danger');
  else if (secondsLeft <= 60) box.classList.add('warning');
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function renderQuestion() {
  answered_flag = false;
  const q = currentQuestions[currentIndex];
  const total = currentQuestions.length;

  document.getElementById('qNumber').textContent = 'សំណួរទី ' + (currentIndex + 1) + ' / ' + total;
  document.getElementById('qText').textContent = q.q;

  const pct = (currentIndex / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'ទំ ' + currentIndex + ' ចេញពី ' + total + ' បានបញ្ចប់';

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  const letters = ['ក','ខ','គ','ឃ'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, q.ans, btn);
    list.appendChild(btn);
  });

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.style.display = 'none';
  fb.textContent = '';

  document.getElementById('nextBtn').disabled = true;
  document.getElementById('skipBtn').disabled = false;
}

function selectAnswer(selected, correct, clickedBtn) {
  if (answered_flag) return;
  answered_flag = true;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedbackBox');

  if (selected === correct) {
    clickedBtn.classList.add('correct');
    fb.textContent = '✅ ត្រឹមត្រូវ!';
    fb.className = 'feedback-box correct';
    score++;
    answered.push({ q: currentQuestions[currentIndex].q, correct: true, yourAns: currentQuestions[currentIndex].opts[selected], rightAns: currentQuestions[currentIndex].opts[correct] });
  } else {
    clickedBtn.classList.add('wrong');
    buttons[correct].classList.add('reveal');
    fb.textContent = '❌ មិនត្រឹមត្រូវ — ចម្លើយត្រឹមត្រូវ: ' + currentQuestions[currentIndex].opts[correct];
    fb.className = 'feedback-box wrong';
    answered.push({ q: currentQuestions[currentIndex].q, correct: false, yourAns: currentQuestions[currentIndex].opts[selected], rightAns: currentQuestions[currentIndex].opts[correct] });
  }

  fb.style.display = 'block';
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('skipBtn').disabled = true;
}

function skipQuestion() {
  answered.push({ q: currentQuestions[currentIndex].q, correct: false, yourAns: '(រំលង)', rightAns: currentQuestions[currentIndex].opts[currentQuestions[currentIndex].ans] });
  nextQuestion();
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    clearInterval(timerInterval);
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  clearInterval(timerInterval);
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'block';

  const total = currentQuestions.length;
  const pct = Math.round((score / total) * 100);

  const ring = document.getElementById('scoreRing');
  if (pct >= 80) ring.style.background = '#1a7a40';
  else if (pct >= 50) ring.style.background = '#9a623a';
  else ring.style.background = '#b81a1a';

  document.getElementById('scoreNum').textContent = score + '/' + total;
  document.getElementById('scorePct').textContent = pct + '%';

  let title, sub;
  if (pct >= 80) { title = '🎉 អស្ចារ្យ! លទ្ធផលល្អ!'; sub = 'អ្នកបានឆ្លងការប្រឡងជាមួយពិន្ទុខ្ពស់!'; }
  else if (pct >= 50) { title = '👍 ល្អប្រសើរ!'; sub = 'អ្នកជាប់ ប៉ុន្តែអ្នកអាចធ្វើបានល្អជាងនេះ!'; }
  else { title = '💪 ត្រូវព្យាយាមបន្ថែម!'; sub = 'អ្នកមិនទាន់ជាប់ — ត្រូវព្យាយាមម្ដងទៀត!'; }

  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsSub').textContent = sub;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = total - score;

  const mu = Math.floor(secondsUsed / 60);
  const su = secondsUsed % 60;
  document.getElementById('timeUsed').textContent = pad(mu) + ':' + pad(su);

  const rl = document.getElementById('reviewList');
  rl.innerHTML = '<div style="font-size:15px;font-weight:700;margin-bottom:1rem;color:var(--text-dark)">ការត្រួតពិនិត្យចម្លើយ</div>';
  answered.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'review-item ' + (a.correct ? 'correct' : 'wrong');
    div.innerHTML = `<div class="ri-q">${i+1}. ${a.q}</div><div class="ri-a">${a.correct ? '✅' : '❌'} ចម្លើយអ្នក: ${a.yourAns}</div>${!a.correct ? `<div class="ri-correct">✅ ត្រឹមត្រូវ: ${a.rightAns}</div>` : ''}`;
    rl.appendChild(div);
  });
}

function retryQuiz() { startQuiz(currentSubject); }
function showPicker() {
  clearInterval(timerInterval);
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('resultsScreen').style.display = 'none';
  document.getElementById('subjectPicker').style.display = 'block';
}

renderSubjectPicker();

const params = new URLSearchParams(window.location.search);
const subId = params.get('subject');
if (subId) {
  const found = SUBJECTS.find(s => s.id === subId);
  if (found) startQuiz(found);
}
</script>
</body>
</html>
